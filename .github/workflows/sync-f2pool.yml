name: Sync F2Pool Daily

on:
  schedule:
    - cron: '0 1 * * *'  # 01:00 UTC = 21:00 Paraguay (UTC-4)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - run: npm install @supabase/supabase-js node-fetch

      - name: Sync F2Pool data
        env:
          SUPABASE_URL: https://cidfzfapcvoyrunxoskn.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          F2POOL_API_KEY: ${{ secrets.F2POOL_API_KEY }}
        run: node scripts/sync-f2pool.js
